# Website Workflow Feature Development Section Or Component

## Action

Follow the feature-development-section-or-component workflow:
1. Create new component(s) under src/components/[area]/ or src/components/ui/
2. If needed, add supporting modules/hooks under src/modules/ or src/hooks/
3. Update shared layout or wrapper components (e.g., app-layout.astro, section.astro, footer.astro)
4. Wire new component(s) into relevant page(s) under src/pages/
5. Update styles in src/styles/global.css or similar
6. If needed, update config or content files (e.g., src/content.config.ts, src/content/...)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~6x per month
- Files: src/components/[area]/*.astro, src/components/[area]/*.tsx, src/components/ui/*.tsx

